<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Space Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }

        /* ── Connection overlay (shown until the data channel opens) ── */
        #connection-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: white;
            text-align: center;
            padding: 1.5rem;
            box-sizing: border-box;
            transition: opacity 0.5s;
        }

        #connection-overlay h2 {
            margin: 0 0 1rem;
            font-size: 1.4rem;
        }

        /* White background so QR code is always scannable */
        #qr {
            background: white;
            padding: 10px;
            border-radius: 8px;
            margin: 0.75rem 0;
        }

        #url {
            font-size: 0.75rem;
            word-break: break-all;
            max-width: 420px;
            display: block;
            margin: 0.4rem 0;
            color: #93c5fd;
        }

        #socket-info {
            font-size: 0.75rem;
            color: #aaa;
            margin: 0.25rem 0;
        }

        #rtcStatus {
            font-size: 0.85rem;
            color: #fde68a;
            margin: 0.4rem 0;
        }

        #status {
            font-size: 1rem;
            color: #4ade80;
            margin: 0.5rem 0 0;
        }

        /* Fade the overlay out when the controller connects */
        #connection-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #gameCanvas {
            display: block;
        }
    </style>
</head>

<body>
    <!-- ── Overlay: visible until controller data channel opens ── -->
    <div id="connection-overlay">
        <h2>Scan to Connect Controller</h2>
        <div id="qr"></div>
        <span id="url">Connecting to server…</span>
        <p id="socket-info">Socket ID: <span id="socketId">…</span></p>
        <p id="rtcStatus">Waiting for controller…</p>
        <p id="status">Waiting for connection…</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- socket.io must load before game.js so io() is available -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- qrcode-generator: used by game.js's showControllerUrl() -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <!-- game.js: handles socket.io, WebRTC signalling, QR display, and the game loop -->
    <script src="js/game.js" defer></script>
</body>

</html>
