<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Space Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }

        /* ── Connection overlay (shown until the data channel opens) ── */
        #connection-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: hsl(208, 57%, 5%,90%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: white;
            text-align: center;
            padding: 1.5rem;
            box-sizing: border-box;
            transition: opacity 0.5s;
            font-family: Helvetica, sans-serif;
        }

        #connection-overlay h2 {
            margin: 0 0 1rem;
            font-size: 1.4rem;
        }

        /* White background so QR code is always scannable */
        #qr {
            background: white;
            padding: 10px;
            border-radius: 8px;
            margin: 0.75rem 0;
        }

        #overlay-subtitle {
            font-size: 0.95rem;
            color: #aaa;
            margin: 0.5rem 0 0;
        }

        /* Fade the overlay out when the controller connects */
        #connection-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #gameCanvas {
            display: block;
        }
    </style>
</head>

<body>
    <!-- ── Overlay: visible until controller data channel opens ── -->
    <div id="connection-overlay">
        <h2>Scan to connect your controller</h2>
        <div id="qr"></div>
        <p id="overlay-subtitle">Open on your phone and tilt to play</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- socket.io must load before game.js so io() is available -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- qrcode-generator: used by game.js's showControllerUrl() -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <!-- simple-peer: WebRTC data channel abstraction -->
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <!-- game.js: handles socket.io, WebRTC signalling, QR display, and the game loop -->
    <script src="js/game.js" defer></script>
</body>

</html>
