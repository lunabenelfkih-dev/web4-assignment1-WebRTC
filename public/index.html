<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Desktop Viewer</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #info {
            position: relative;
            z-index: 10;
            background: #fff;
            padding: 1rem;
            border-radius: 0.5rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        #qr {
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <div id="info">
        <div>Your socket id: <span id="socketId">...</span></div>
        <div>WebRTC: <span id="rtcStatus">Waiting for controller…</span></div>
        <div>Controller URL: <span id="url">...</span></div>
        <div id="qr"></div>
    </div>

    <div id="ui">
        <div id="status">Waiting for connection...</div>
        <div id="id-display"></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <!-- Single socket.io import — game.js handles all WebRTC logic -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <!-- game.js handles socket.io, WebRTC signalling, QR display, and the game loop -->
    <script src="js/game.js" defer></script>

</body>

</html>
