<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Space Shooter</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <button id="music-toggle-btn" class="music-btn paused"></button>

    <div id="connection-overlay">
        <h2>Scan to connect your controller</h2>
        <div id="qr"></div>
        <p id="overlay-subtitle">Open on your phone and tilt to play</p>
    </div>

    <div id="game-over-overlay" class="hidden">
        <h2>GAME OVER</h2>
        <p>Final Score: <span id="final-score">0</span></p>
        <button id="restart-btn">Restart Game</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <script src="js/game.js" defer></script>
</body>

</html>
