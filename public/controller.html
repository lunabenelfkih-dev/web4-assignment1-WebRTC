<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Controller</title>
</head>

<body>
    <h1>WebRTC Controller</h1>

    <p>Status: <span id="status">Connecting to server…</span></p>
    <p>WebRTC: <span id="rtcStatus">Idle</span></p>

    <p id="instructions" style="display:none">
        Tilt your phone left/right to move. Tap to fire.
    </p>

    <p id="gyro-debug" style="font-family:monospace; font-size:1rem; color:#666;">Gamma: —</p>

    <button id="enableGyro" style="padding:1rem 2rem; font-size:1.2rem">
        Tap to enable gyroscope
    </button>

    <script src="/socket.io/socket.io.js"></script>
    <!-- simple-peer: WebRTC data channel abstraction -->
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <script>
        const $status = document.getElementById('status');
        const $rtcStatus = document.getElementById('rtcStatus');
        const $instructions = document.getElementById('instructions');
        const $enableGyro = document.getElementById('enableGyro');
        const $gyroDebug = document.getElementById('gyro-debug');

        let lastSendTime = 0;
        let socket;
        let peer;
        let targetSocketId;

        const getUrlParam = name => {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            const results = regex.exec(location.search);
            return results === null ? false : decodeURIComponent(results[1].replace(/\+/g, ' '));
        };

        const sendGyro = (gamma) => {
            $gyroDebug.textContent = `Gamma: ${gamma !== null ? gamma.toFixed(1) + '°' : 'null (sensor not ready)'}`;
            if (gamma === null || gamma === undefined) return; // sensor not calibrated yet
            if (!peer || !peer.connected) return;

            const now = Date.now();
            if (now - lastSendTime < 50) return;
            lastSendTime = now;

            peer.send(JSON.stringify({ type: 'move', x: gamma }));
        };

        // Simple Peer setup (Initiator)
        const startWebRTC = () => {
            peer = new SimplePeer({ initiator: true, trickle: false });
            $rtcStatus.textContent = 'Connecting — gathering ICE…';

            // trickle: false → fires exactly once with the complete offer + all ICE candidates
            peer.on('signal', data => {
                socket.emit('signal', targetSocketId, data);
                $rtcStatus.textContent = 'Offer sent — waiting for answer…';
            });

            peer.on('connect', () => {
                $rtcStatus.textContent = 'Connected — tilt to control!';
                $instructions.style.display = 'block';
            });

            peer.on('close', () => {
                $rtcStatus.textContent = 'Connection closed';
                $instructions.style.display = 'none';
            });

            peer.on('error', err => {
                console.error('[controller] peer error:', err);
                $rtcStatus.textContent = `Error: ${err.message}`;
            });
        };

        // Gyroscope input
        const startGyro = () => {
            window.addEventListener('deviceorientation', e => {
                sendGyro(e.gamma);
            });
            $enableGyro.textContent = 'Gyroscope active ✅';
            $enableGyro.disabled = true;
        };

        const requestGyroPermission = () => {
            if (typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS 13+ requires explicit permission
                DeviceOrientationEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') startGyro();
                        else $enableGyro.textContent = 'Permission denied';
                    })
                    .catch(console.error);
            } else {
                // Android and desktop — no permission needed
                startGyro();
            }
        };

        $enableGyro.addEventListener('click', requestGyroPermission);

        const init = () => {
            targetSocketId = getUrlParam('id');

            if (!targetSocketId) {
                alert('Missing target desktop ID in the URL.\nExample: /controller.html?id=<desktop-socket-id>');
                return;
            }

            // Fire on tap anywhere on the screen
            window.addEventListener('touchstart', () => {
                if (!peer || !peer.connected) return;
                peer.send(JSON.stringify({ type: 'fire' }));
            }, { passive: true });

            socket = io.connect('/');

            socket.on('connect', () => {
                $status.textContent = `Connected (${socket.id})`;
                startWebRTC();
            });

            socket.on('disconnect', () => {
                $status.textContent = 'Disconnected';
            });

            // Receive the answer from the game and feed it into Simple Peer to complete the handshake
            socket.on('signal', (remoteSocketId, data) => {
                peer.signal(data);
                $rtcStatus.textContent = 'Answer received — finalising…';
            });
        };

        init();
    </script>
</body>

</html>
