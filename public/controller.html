<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Controller</title>
</head>

<body>
    <h1>WebRTC Controller</h1>

    <p>Status: <span id="status">Connecting to server…</span></p>
    <p>WebRTC: <span id="rtcStatus">Idle</span></p>

    <p id="instructions" style="display:none">
        Tilt your phone left/right to move. Tap to fire.
    </p>

    <!-- Live sensor debug readout -->
    <p id="gyro-debug" style="font-family:monospace; font-size:1rem; color:#666;">Gamma: —</p>

    <!-- iOS 13+ requires a user gesture to grant DeviceOrientation permission -->
    <button id="enableGyro" style="padding:1rem 2rem; font-size:1.2rem">
        Tap to enable gyroscope
    </button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const $status = document.getElementById('status');
        const $rtcStatus = document.getElementById('rtcStatus');
        const $instructions = document.getElementById('instructions');
        const $enableGyro = document.getElementById('enableGyro');
        const $gyroDebug = document.getElementById('gyro-debug');

        // Throttle: only send one orientation message per 50 ms
        let lastSendTime = 0;

        let socket;
        let pc;          // RTCPeerConnection
        let dataChannel; // RTCDataChannel
        let targetSocketId;

        // ── ICE configuration ─────────────────────────────────────────────────────
        // No STUN needed — phone and PC are on the same LAN.
        const RTC_CONFIG = {};

        /**
         * Resolves when ICE gathering reaches 'complete', or after 3 seconds —
         * whichever comes first. LAN (host) candidates are gathered in <100 ms;
         * the timeout only fires if the browser is waiting on an unreachable STUN server.
         */
        function waitForIceGathering(pc) {
            return new Promise(resolve => {
                if (pc.iceGatheringState === 'complete') { resolve(); return; }
                const timer = setTimeout(resolve, 3000);
                pc.addEventListener('icegatheringstatechange', () => {
                    if (pc.iceGatheringState === 'complete') {
                        clearTimeout(timer);
                        resolve();
                    }
                });
            });
        }

        // ── URL query-string helper ───────────────────────────────────────────────
        const getUrlParam = name => {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            const results = regex.exec(location.search);
            return results === null ? false : decodeURIComponent(results[1].replace(/\+/g, ' '));
        };

        // ── Send control data via the data channel ────────────────────────────────
        // Sends raw gamma so game.js can map it to canvas width (it expects -90..90).
        const sendGyro = (gamma) => {
            // Always update the debug readout so we can see if the sensor is firing
            $gyroDebug.textContent = `Gamma: ${gamma !== null ? gamma.toFixed(1) + '°' : 'null (sensor not ready)'}`;

            if (gamma === null || gamma === undefined) return; // sensor not calibrated yet
            if (!dataChannel || dataChannel.readyState !== 'open') return;

            // Throttle to 20 fps to avoid flooding the data channel
            const now = Date.now();
            if (now - lastSendTime < 50) return;
            lastSendTime = now;

            dataChannel.send(JSON.stringify({ type: 'move', x: gamma }));
        };

        // ── WebRTC setup (controller is the "offerer") ────────────────────────────
        const startWebRTC = async () => {
            pc = new RTCPeerConnection(RTC_CONFIG);
            $rtcStatus.textContent = 'Peer connection created';

            // Create the data channel — this is what carries the actual controls
            dataChannel = pc.createDataChannel('controls');

            dataChannel.onopen = () => {
                $rtcStatus.textContent = 'Data channel open — tilt to control!';
                $instructions.style.display = 'block';
            };

            dataChannel.onclose = () => {
                $rtcStatus.textContent = 'Data channel closed';
                $instructions.style.display = 'none';
            };

            // No trickle ICE — candidates are embedded in the SDP
            pc.onicecandidate = () => { };

            pc.onconnectionstatechange = () => {
                $rtcStatus.textContent = `WebRTC: ${pc.connectionState}`;
            };

            pc.oniceconnectionstatechange = () => {
                console.log('[controller] ICE state:', pc.iceConnectionState);
                $rtcStatus.textContent = `ICE: ${pc.iceConnectionState}`;
            };

            // Create the offer, wait for all ICE candidates to be gathered,
            // then send one complete offer with candidates embedded in the SDP
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            $rtcStatus.textContent = 'Step 1/4: Gathering LAN candidates…';

            await waitForIceGathering(pc);
            $rtcStatus.textContent = 'Step 2/4: Sending offer to desktop…';
            socket.emit('signal', targetSocketId, pc.localDescription);
            $rtcStatus.textContent = 'Step 3/4: Offer sent — waiting for answer…';
        }

        // ── Gyroscope input ───────────────────────────────────────────────────────
        const startGyro = () => {
            window.addEventListener('deviceorientation', e => {
                sendGyro(e.gamma);
            });
            $enableGyro.textContent = 'Gyroscope active ✅';
            $enableGyro.disabled = true;
        };

        const requestGyroPermission = () => {
            if (typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS 13+ requires explicit permission
                DeviceOrientationEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') startGyro();
                        else $enableGyro.textContent = 'Permission denied';
                    })
                    .catch(console.error);
            } else {
                // Android and desktop — no permission needed
                startGyro();
            }
        };

        $enableGyro.addEventListener('click', requestGyroPermission);

        const init = () => {
            targetSocketId = getUrlParam('id');

            if (!targetSocketId) {
                alert('Missing target desktop ID in the URL.\nExample: /controller.html?id=<desktop-socket-id>');
                return;
            }

            // Fire on tap anywhere on the screen
            window.addEventListener('touchstart', () => {
                if (!dataChannel || dataChannel.readyState !== 'open') return;
                dataChannel.send(JSON.stringify({ type: 'fire' }));
            }, { passive: true });

            socket = io.connect('/');

            socket.on('connect', () => {
                $status.textContent = `Connected (${socket.id})`;
                // Start WebRTC negotiation as soon as we have a socket connection
                startWebRTC();
            });

            socket.on('disconnect', () => {
                $status.textContent = 'Disconnected';
            });

            // Receive signalling replies from the desktop
            socket.on('signal', async (remoteSocketId, data) => {
                if (data.type === 'answer') {
                    await pc.setRemoteDescription(new RTCSessionDescription(data));
                    $rtcStatus.textContent = 'Step 4/4: Answer received — connecting…';
                }
                // No 'candidate' handling needed — all candidates are embedded in the SDP
            });

            // ── Input events replaced by gyroscope (see requestGyroPermission above) ──
        };

        init();
    </script>
</body>

</html>
