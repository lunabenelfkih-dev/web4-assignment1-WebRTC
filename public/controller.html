<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Controller</title>
    <link rel="stylesheet" href="css/controller.css">

</head>

<body>
    <div id="portrait-warning">
        <h1>Rotate to Landscape</h1>
        <p>Please rotate your phone to landscape mode to play</p>
    </div>

    <div id="start-overlay" class="active">
        <h1>SPACE SHOOTER</h1>
        <p>Ready to play? Activate your sound for a better experience</p>
        <button id="start-button">START</button>
        <div id="status-message"></div>
    </div>

    <div id="controller-ui">
        <div class="score-display" id="score-display">SCORE: 0</div>
        <div class="controller-container">
            <div class="control-center">
                <img src="/assets/fire.svg" alt="Fire" class="fire-icon left">

                <div class="tilt-indicator">
                    <div class="tilt-label">TILT</div>
                    <div class="tilt-bar-container">
                        <div class="tilt-bar" id="tilt-bar"></div>
                    </div>
                </div>

                <img src="/assets/fire.svg" alt="Fire" class="fire-icon right">
            </div>
        </div>
    </div>

    <div id="game-over-overlay-phone">
        <h2>GAME OVER</h2>
        <p>Final Score: <span id="final-score-phone">0</span></p>
        <button id="play-again-btn">PLAY AGAIN</button>
    </div>

    <p>Status: <span id="status">Connecting to server…</span></p>
    <p>WebRTC: <span id="rtcStatus">Idle</span></p>

    <p id="instructions">
        Tilt your phone left/right to move. Tap to fire.
    </p>

    <p id="gyro-debug">Beta: —</p>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <script src="js/remote.js"></script>
</body>

</html>
